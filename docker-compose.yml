x-common-env: &common-env
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

x-common-labels: &common-labels
  com.ev-qa.framework: "2.0.0"
  com.ev-qa.managed-by: "docker-compose"

services:
  # ---- Test Runner ----
  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ev-qa-tests
    environment:
      <<: *common-env
      EV_QA_MODE: testing
    networks:
      - ev-qa-net
    labels:
      <<: *common-labels
      com.ev-qa.service: tests
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
    entrypoint: ["python"]
    command: >
      -m pytest tests/ -v
      --cov=ev_qa_framework
      --cov-report=html:/app/results/coverage
      --cov-report=xml:/app/results/coverage.xml
      --junitxml=/app/results/junit.xml
      --tb=short
    volumes:
      - test-results:/app/results

  # ---- Dashboard (serves coverage / test reports) ----
  dashboard:
    image: python:3.12-slim
    container_name: ev-qa-dashboard
    working_dir: /app/results
    volumes:
      - test-results:/app/results:ro
    networks:
      - ev-qa-net
    labels:
      <<: *common-labels
      com.ev-qa.service: dashboard
    ports:
      - "8081:8080"
    command: python -m http.server 8080 --directory /app/results
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      tests:
        condition: service_completed_successfully

  # ---- Grafana (battery metrics) ----
  grafana:
    image: grafana/grafana:11.3.0
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    container_name: ev-qa-grafana
    environment:
      <<: *common-env
      GF_SECURITY_ADMIN_PASSWORD: {GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    networks:
      - ev-qa-net
    labels:
      <<: *common-labels
      com.ev-qa.service: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboard/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboard/grafana/dashboard.json:/var/lib/grafana/dashboards/ev-battery-metrics.json:ro
    restart: unless-stopped
    depends_on:
      tests:
        condition: service_completed_successfully

volumes:
  test-results:
    labels:
      com.ev-qa.description: "Test results, coverage reports, JUnit XML"
  grafana-data:
    labels:
      com.ev-qa.description: "Grafana database and plugins"

networks:
  ev-qa-net:
    driver: bridge
