name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          pip install uv

      - name: Install deps
        run: |
          ~/.local/bin/uv sync --no-extra ml --no-extra dev

      - name: Lint
        run: ~/.local/bin/uv run ruff check ev_qa_framework/

      - name: Test
        run: ~/.local/bin/uv run pytest tests/ --cov=ev_qa_framework --tb=short -x -k "not soh" --ignore=tests/test_soh_predictor.py