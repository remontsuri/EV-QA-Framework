name: Release — Test · Build · Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- Gate: run full test suite before any release ----
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run full test suite
        run: >
          uv run pytest tests/ -v
          --cov=ev_qa_framework
          --cov-report=term-missing
          --tb=short

  # ---- Build & Publish ----
  release:
    name: Build & Publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # Required for trusted publishing
      contents: write    # Required for GitHub Release

    environment:
      name: pypi
      url: https://pypi.org/p/ev-qa-framework

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: uv sync --frozen

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(uv run python -c "import ev_qa_framework; print(ev_qa_framework.__version__)")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::Version mismatch: tag ${{ steps.version.outputs.VERSION }} != package $PKG_VERSION"
            exit 1
          fi
          echo "✓ Version verified: $PKG_VERSION"

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "EV-QA-Framework ${{ steps.version.outputs.VERSION }}"
          body: |
            ## EV-QA-Framework ${{ steps.version.outputs.VERSION }}

            ### Installation
            ```bash
            pip install ev-qa-framework==${{ steps.version.outputs.VERSION }}
            ```

            ### What's New
            See [CHANGELOG.md](https://github.com/remontsuri/EV-QA-Framework/blob/main/CHANGELOG.md)
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
