# =============================================================================
# EV-QA-Framework — Nginx Production Configuration
# =============================================================================
# Place this file at: /etc/nginx/conf.d/default.conf
# (mounted from ./nginx/nginx.conf in docker-compose.prod.yml)
#
# SSL Setup (production):
#   1. Obtain certificates (e.g. Let's Encrypt / certbot)
#   2. Uncomment the SSL server block below
#   3. Place cert.pem and key.pem in ./ssl/
#   4. Restart: docker compose -f docker-compose.prod.yml restart nginx
# =============================================================================

upstream ev_qa_app {
    server app:8000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Rate limiting zone (shared across all server blocks)
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=ev_qa_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=ev_qa_conn:10m;

# ---------------------------------------------------------------------------
# HTTP (redirect to HTTPS if SSL is configured)
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name _;

    # ---- Uncomment for SSL redirect ----
    # return 301 https://$host$request_uri;

    # ---- Or use HTTP-only (dev/staging) ----
    # Include the main config directly:

    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 15s;
    send_timeout 10s;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # -----------------------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers (broad — restrict in production if needed)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;

    # -----------------------------------------------------------------------
    # Static files (FastAPI also serves these, but nginx is faster)
    # -----------------------------------------------------------------------
    location /dashboard/static/ {
        alias /app/dashboard/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # WebSocket endpoint
    # -----------------------------------------------------------------------
    location /ws {
        proxy_pass http://ev_qa_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -----------------------------------------------------------------------
    # API and main application
    # -----------------------------------------------------------------------
    location / {
        # Rate limiting
        limit_req zone=ev_qa_limit burst=20 nodelay;
        limit_conn ev_qa_conn 10;

        proxy_pass http://ev_qa_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
        proxy_busy_buffers_size 16k;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        # Pass upstream basic auth / API key headers if needed
        # proxy_set_header Authorization $http_authorization;
    }

    # -----------------------------------------------------------------------
    # Health check — no rate limiting
    # -----------------------------------------------------------------------
    location /health {
        access_log off;
        proxy_pass http://ev_qa_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

