# Tox configuration for documentation builds
# Usage: tox -e docs

[tox]
envlist = docs
skipsdist = True

[testenv:docs]
deps =
    sphinx>=5.0
    sphinx-autodoc-typehints>=2.3.0
    sphinx-rtd-theme>=1.0
commands =
    sphinx-build -b html docs/source docs/build/html
    sphinx-build -b linkcheck docs/source docs/build/linkcheck
