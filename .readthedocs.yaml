# ReadTheDocs configuration
# See: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    post_create_command:
      - pip install uv
      - uv pip install --system -e ".[docs]"

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

formats:
  - htmlzip
  - pdf

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
